<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사주덱스 - 아!사주의 커뮤니티 위키</title>
    <meta name="description" content="세상의 모든 사주 데이터를 모으다. 모두가 함께 만드는 재미있는 사주 백과사전!">
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">📚</span>
            사주덱스
        </div>
        <ul class="nav-links">
            <li><a href="https://asaju.com">Asaju 홈</a></li>
            <li><a href="https://sajucube.asaju.com">Sajucube</a></li>
        </ul>
    </nav>

    <main>
        <header class="hero">
            <h1 class="fade-in">모두가 함께 만드는<br><span class="accent-text">사주 백과사전</span></h1>
            <p class="fade-in delay-1">궁금했던 유명인의 사주를 찾아보거나,<br>내 소중한 인연들의 기록을 나만의 인연첩에 남겨보세요!</p>
        </header>

        <section class="cards-container fade-in delay-2">
            <div class="glass-card">
                <div class="card-icon">🌍</div>
                <h2>공개 사주 위키</h2>
                <p>수많은 유명인의 사주 명식을 검색하고 스터디할 수 있는 오픈 공간입니다. 똑같은 사주를 가진 사람들은 어떻게 살고 있을까요?</p>
                <button class="btn btn-outline" onclick="alert('퍼블릭 검색 기능은 준비 중입니다.')">데이터베이스 검색</button>
            </div>

            <div class="glass-card primary-card">
                <div class="card-icon">🔐</div>
                <h2>나만의 인연첩</h2>
                <p>내 주변 사람들의 사주를 그룹화해서 저장하고 메모해두세요! 내 인연들의 운의 흐름을 한눈에 관리할 수 있습니다.</p>
                <button class="btn btn-filled" onclick="alert('인연첩 로컬 스토리지가 연결되지 않았습니다.')">내 인연첩 열기</button>
            </div>
        </section>
    </main>

    <footer>
        <p>Powered by <strong>Sajucube Core</strong> Engine</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
