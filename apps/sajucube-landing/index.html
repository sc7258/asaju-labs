<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사주큐브 - 아!사주의 즐거운 만세력</title>
    <meta name="description" content="어렵고 복잡한 만세력은 그만! 내 사주를 한눈에 쏙 들어오게 예쁘고 정확하게 뽑아보세요.">
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cube-background">
        <div class="cube-grid"></div>
    </div>
    
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">✨</span>
            사주큐브
        </div>
        <div style="display: flex; gap: 1.5rem;">
            <a href="https://sajudex.asaju.com" class="back-link">Sajudex →</a>
            <a href="https://asaju.com" class="back-link">← Asaju.com</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="badge">A!Saju Tool 🥳</div>
            <h1 class="fade-in">어렵고 복잡한 사주는 그만!<br><span class="gradient-text">내 사주를 한눈에 쏙</span></h1>
            <p class="fade-in delay-1">어디서도 볼 수 없었던 예쁘고 깔끔한 만세력!<br>내 명식을 뽑아보고 숨겨진 나의 진짜 모습을 발견해 보세요.</p>
            
            <div class="action-card fade-in delay-2 glass-panel">
                <div class="input-group">
                    <input type="text" placeholder="이름 (선택사항)" class="modern-input">
                    <input type="date" class="modern-input">
                    <select class="modern-input">
                        <option>시간 모름</option>
                        <option>자시 (23:30 ~ 01:30)</option>
                    </select>
                </div>
                <button class="btn btn-primary pulse">명식 뽑기</button>
            </div>
        </section>

        <section class="tech-stack fade-in delay-3">
            <p class="subtitle">Powered By</p>
            <div class="stack-logos">
                <span class="stack-item">Next.js</span>
                <span class="stack-item">TypeScript</span>
                <span class="stack-item">Tailwind</span>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
